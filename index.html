<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Alshather">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>&#x1F3E0; Alshather Control App</title>
<style>
:root{--bg:#f9fafb;--card:#fff;--sec:#f3f4f6;--s-ok:#f0fdf4;--s-warn:#fffbeb;--s-danger:#fef2f2;--s-info:#eff6ff;--s-purple:#f5f3ff;--text:#111827;--muted:#6b7280;--c-ok:#16a34a;--c-warn:#d97706;--c-danger:#dc2626;--c-info:#2563eb;--c-purple:#7c3aed;--border:#e5e7eb;--radius:12px;--rsm:8px;}
@media(prefers-color-scheme:dark){:root{--bg:#0f172a;--card:#1e293b;--sec:#334155;--s-ok:#052e1690;--s-warn:#451a0390;--s-danger:#450a0a90;--s-info:#1e3a5f90;--s-purple:#3b076490;--text:#f1f5f9;--muted:#94a3b8;--c-ok:#4ade80;--c-warn:#fbbf24;--c-danger:#f87171;--c-info:#60a5fa;--c-purple:#a78bfa;--border:#334155;}}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);min-height:100vh;color:var(--text)}
input,select{width:100%;padding:9px 12px;border-radius:var(--rsm);border:1px solid var(--border);font-size:14px;color:var(--text);outline:none;background:var(--card);font-family:inherit}
input:focus,select:focus{border-color:var(--c-info)}
.card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:20px}
.btn{padding:9px 18px;border-radius:var(--rsm);border:none;cursor:pointer;font-size:14px;font-weight:500;font-family:inherit;display:inline-flex;align-items:center;gap:6px}
.btn-p{background:#2563eb;color:#fff}.btn-g{background:transparent;color:var(--text);border:1px solid var(--border)}.btn-sm{padding:6px 12px;font-size:13px}
.overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:24px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto}
.tab{padding:12px 16px;border:none;background:none;cursor:pointer;font-size:13px;font-weight:500;color:var(--muted);border-bottom:2px solid transparent;white-space:nowrap;font-family:inherit}
.tab.on{color:#2563eb;border-bottom-color:#2563eb}
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:99px;font-size:11px;font-weight:500;cursor:pointer;border:none;font-family:inherit}
.b-ok{background:var(--s-ok);color:var(--c-ok)}.b-warn{background:var(--s-warn);color:var(--c-warn)}.b-danger{background:var(--s-danger);color:var(--c-danger)}.b-purple{background:var(--s-purple);color:var(--c-purple)}
.mtoggle{padding:7px 10px;border-radius:var(--rsm);font-size:12px;cursor:pointer;font-family:inherit;font-weight:500;border:1px solid var(--border);background:var(--card);color:var(--muted);text-align:left;width:100%}
.mtoggle.paid{background:var(--s-ok);color:var(--c-ok);border-color:transparent}
.pill{font-size:10px;padding:2px 7px;border-radius:99px;font-weight:600}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;display:inline-block}
</style>
</head>
<body>
<div id="root"></div>
<script>
const N=16,LS_DATA='aca-v3',LS_FB='aca-fb',LS_ADM='aca-admin';
const TRASH=`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>`;
const CLOSE=`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;
const gid=()=>`${Date.now()}-${Math.random().toString(36).slice(2,7)}`;
const fmt=n=>'SAR '+(+n||0).toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2});
const nowM=()=>new Date().toISOString().slice(0,7);
const nowD=()=>new Date().toISOString().slice(0,10);
const mLbl=ym=>new Date(ym+'-01').toLocaleDateString('en',{month:'long',year:'numeric'});
function addM(ym,n){const[y,m]=ym.split('-').map(Number);const t=m-1+n;return`${y+Math.floor(t/12)}-${String((t%12)+1).padStart(2,'0')}`;}

// Admin
let isAdmin=localStorage.getItem(LS_ADM)==='true';
async function hashPw(pw){const d=new TextEncoder().encode(pw+':aca-salt-2025');const b=await crypto.subtle.digest('SHA-256',d);return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('');}
function setAdmin(v){isAdmin=v;localStorage.setItem(LS_ADM,v?'true':'false');render();}

function openUnlockModal(cb){
  let pw='';
  const err=el('div',{style:{color:'var(--c-danger)',fontSize:'13px',marginTop:'8px',display:'none'}},['Incorrect password.']);
  const pi=document.createElement('input');pi.type='password';pi.placeholder='Admin password';pi.addEventListener('input',e=>pw=e.target.value);pi.addEventListener('keydown',e=>{if(e.key==='Enter')go();});
  const btn=el('button',{class:'btn btn-p',style:{width:'100%'}},['Unlock']);
  async function go(){
    if(!pw)return;
    if(!state.adminHash){setAdmin(true);modalEl&&(modalEl.remove(),modalEl=null);cb&&cb();return;}
    const h=await hashPw(pw);
    if(h===state.adminHash){setAdmin(true);modalEl&&(modalEl.remove(),modalEl=null);cb&&cb();}
    else{err.style.display='block';pi.value='';pw='';}
  }
  btn.addEventListener('click',go);
  const note=!state.adminHash
    ?el('div',{style:{background:'var(--s-info)',borderRadius:'var(--rsm)',padding:'10px 12px',marginBottom:'12px',fontSize:'13px',color:'var(--c-info)'}},[`No password set \u2014 click Unlock to enter admin mode.`])
    :el('div',{style:{fontSize:'13px',color:'var(--muted)',marginBottom:'12px'}},['Enter the admin password to enable editing.']);
  showModal('&#x1F512; Unlock Editing',el('div',[note,fw('Password',pi),btn,err]));
}

function openSetPwModal(){
  let p1='',p2='';
  const err=el('div',{style:{color:'var(--c-danger)',fontSize:'13px',marginTop:'8px',display:'none'}});
  const i1=document.createElement('input');i1.type='password';i1.placeholder='New password (min 4 chars)';i1.addEventListener('input',e=>p1=e.target.value);
  const i2=document.createElement('input');i2.type='password';i2.placeholder='Confirm password';i2.addEventListener('input',e=>p2=e.target.value);
  const btn=el('button',{class:'btn btn-p',style:{width:'100%'}},['Save password']);
  btn.addEventListener('click',async()=>{
    if(p1.length<4){err.textContent='Min 4 characters.';err.style.display='block';return;}
    if(p1!==p2){err.textContent='Passwords do not match.';err.style.display='block';return;}
    const h=await hashPw(p1);
    upd(s=>({...s,adminHash:h}));modalEl&&(modalEl.remove(),modalEl=null);
  });
  showModal('Set Admin Password',el('div',[
    el('div',{style:{background:'var(--s-warn)',borderRadius:'var(--rsm)',padding:'10px 12px',marginBottom:'14px',fontSize:'13px',color:'var(--c-warn)'}},[`Share this password only with those who need to edit. Others will be read-only observers.`]),
    fw('New password',i1),fw('Confirm',i2),btn,err
  ]));
}

// State
const INIT={members:[
  {id:'m1',name:'Abdulrahman'},{id:'m2',name:'Mohammed'},{id:'m3',name:'Abdulaziz'},
  {id:'m4',name:'Turki'},{id:'m5',name:'Haitham'},{id:'m6',name:'Bader'},
  {id:'m7',name:'Meshari'},{id:'m8',name:'Sultan'},{id:'m9',name:'Meshal'},
  {id:'m10',name:'Saleh'},{id:'m11',name:'Waleed'},{id:'m12',name:'Faisal'},
  {id:'m13',name:'Amir'},{id:'m14',name:'Nawaf'},{id:'m15',name:'Fahad'},{id:'m16',name:'Saad'}
],treasurer:'m1',adminHash:null,rentPeriods:[],expenses:[],settlements:[],rentPayments:{},qattahs:[],
gathering:{groups:['Abdulaziz & Turki','Mohammed & Abdulrahman','Haitham & Bader','Meshari & Sultan','Meshal & Saleh','Waleed & Faisal','Amir & Nawaf','Fahad & Saad'],anchorDate:'2026-06-23',anchorGroup:3,skipped:[]},
activity:[]
};
function migrate(s){
  if(!s)return JSON.parse(JSON.stringify(INIT));
  return{
    members:s.members||INIT.members,
    treasurer:s.treasurer!==undefined?s.treasurer:'m1',
    adminHash:s.adminHash||null,
    rentPeriods:s.rentPeriods||[],
    expenses:(s.expenses||[]).map(e=>({...e,paidMembers:e.paidMembers||(e.paidBy?[e.paidBy]:[]),poolSettled:e.poolSettled||false})),
    settlements:s.settlements||[],
    rentPayments:(()=>{const rp={};Object.keys(s.rentPayments||{}).forEach(mk=>{const v=s.rentPayments[mk];if(Array.isArray(v)){const obj={};v.forEach(id=>obj[id]={status:'paid',settlementId:null});rp[mk]=obj;}else{rp[mk]=v||{};}});return rp;})(),
    qattahs:(s.qattahs||[]).map(q=>({...q,shares:(q.shares||[]).map(sh=>({...sh,settled:sh.settled!==undefined?sh.settled:(sh.paid||false),settledBy:sh.settledBy||null,cashSettlementId:sh.cashSettlementId||null,partialPaid:sh.partialPaid||0,partialIds:sh.partialIds||[]}))})),
    gathering:s.gathering?{...INIT.gathering,...s.gathering,swaps:s.gathering.swaps||{}}:INIT.gathering,
    activity:(s.activity||[]).slice(-200),
  };
}
let state=null,tab='dashboard',expView='monthly',modalEl=null;

// Firebase (REST + anonymous auth)
let DB_URL=null,FB_KEY=null,evtSrc=null,fbOnline=false,justWrote=false;
let fbToken=null,fbTokenExp=0,authTimer=null;
const isValidFb=u=>u&&u.startsWith('https://')&&(u.includes('firebaseio.com')||u.includes('firebasedatabase.app'));
const fbPath=()=>DB_URL+'/aca.json'+(fbToken?'?auth='+fbToken:'');

// Anonymous authentication: sign in silently, refresh before expiry
async function fbAuth(){
  if(!FB_KEY)return null; // no key configured -> open-rules mode (legacy)
  if(fbToken&&Date.now()<fbTokenExp)return fbToken;
  const savedRefresh=localStorage.getItem('aca-fbrt');
  try{
    if(savedRefresh){
      // Refresh existing anonymous session
      const r=await fetch('https://securetoken.googleapis.com/v1/token?key='+FB_KEY,{
        method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},
        body:'grant_type=refresh_token&refresh_token='+encodeURIComponent(savedRefresh)});
      if(r.ok){const d=await r.json();fbToken=d.id_token;fbTokenExp=Date.now()+(+d.expires_in)*1000-300000;localStorage.setItem('aca-fbrt',d.refresh_token);scheduleAuthRefresh();return fbToken;}
      localStorage.removeItem('aca-fbrt'); // refresh failed -> new anon account
    }
    // Create new anonymous session
    const r=await fetch('https://identitytoolkit.googleapis.com/v1/accounts:signUp?key='+FB_KEY,{
      method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({returnSecureToken:true})});
    if(!r.ok)throw new Error('auth failed');
    const d=await r.json();fbToken=d.idToken;fbTokenExp=Date.now()+(+d.expiresIn)*1000-300000;localStorage.setItem('aca-fbrt',d.refreshToken);scheduleAuthRefresh();return fbToken;
  }catch(e){fbToken=null;return null;}
}
function scheduleAuthRefresh(){
  if(authTimer)clearTimeout(authTimer);
  const ms=Math.max(fbTokenExp-Date.now(),60000);
  authTimer=setTimeout(async()=>{fbToken=null;await fbAuth();if(DB_URL)fbSub();},ms);
}
async function fbRead(){await fbAuth();const r=await fetch(fbPath());if(!r.ok)throw new Error();return r.json();}
async function fbWrite(d){await fbAuth();justWrote=true;setTimeout(()=>justWrote=false,3500);await fetch(fbPath(),{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)});}
async function fbSub(){
  await fbAuth();
  if(evtSrc)evtSrc.close();
  evtSrc=new EventSource(fbPath());
  evtSrc.onopen=()=>{fbOnline=true;rdot();};
  evtSrc.onerror=()=>{fbOnline=false;rdot();};
  evtSrc.addEventListener('auth_revoked',async()=>{fbToken=null;await fbAuth();fbSub();});
  evtSrc.addEventListener('cancel',async()=>{fbToken=null;await fbAuth();fbSub();});
  evtSrc.addEventListener('put',e=>{if(justWrote)return;try{const d=JSON.parse(e.data);const raw=typeof d.data==='string'?JSON.parse(d.data):d.data;if(raw){state=migrate(raw);lsS();render();}}catch{}});
}
// Daily backups: snapshot state to /aca-backups/{date}.json, keep last 7
async function fbSnapshot(){
  if(!DB_URL)return;
  const today=nowD();
  if(localStorage.getItem('aca-lastsnap')===today)return;
  try{
    await fbAuth();
    await fetch(DB_URL+'/aca-backups/'+today+'.json'+(fbToken?'?auth='+fbToken:''),{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(state)});
    localStorage.setItem('aca-lastsnap',today);
    // prune: keep last 7
    const r=await fetch(DB_URL+'/aca-backups.json?shallow=true'+(fbToken?'&auth='+fbToken:''));
    if(r.ok){const keys=Object.keys(await r.json()||{}).sort();
      for(const k of keys.slice(0,-7))await fetch(DB_URL+'/aca-backups/'+k+'.json'+(fbToken?'?auth='+fbToken:''),{method:'DELETE'});}
  }catch{}
}
async function listBackups(){
  if(!DB_URL)return [];
  try{await fbAuth();const r=await fetch(DB_URL+'/aca-backups.json?shallow=true'+(fbToken?'&auth='+fbToken:''));
    if(!r.ok)return [];return Object.keys(await r.json()||{}).sort().reverse();}catch{return [];}
}
async function restoreBackup(dateKey){
  await fbAuth();
  const r=await fetch(DB_URL+'/aca-backups/'+dateKey+'.json'+(fbToken?'?auth='+fbToken:''));
  if(!r.ok)throw new Error();
  const snap=await r.json();if(!snap)throw new Error();
  await upd(()=>migrate(snap),'restored data from backup '+dateKey);
}
function getShareURL(){if(!DB_URL)return null;const payload=FB_KEY?JSON.stringify({u:DB_URL,k:FB_KEY}):DB_URL;return location.origin+location.pathname+'#'+btoa(payload);}
function rdot(){const d=document.getElementById('cdot'),l=document.getElementById('clbl');if(d)d.style.background=DB_URL?(fbOnline?'#22c55e':'#f59e0b'):'#9ca3af';if(l)l.textContent=DB_URL?(fbOnline?'Live':'Connecting...'):'Local only';}

function lsS(){localStorage.setItem(LS_DATA,JSON.stringify(state));}
function lsL(){try{const s=localStorage.getItem(LS_DATA);return s?JSON.parse(s):null;}catch{return null;}}
const devName=()=>localStorage.getItem('aca-devname')||'';
async function upd(fn,logMsg){
  state=fn(state);
  if(logMsg){
    const who=devName();
    state={...state,activity:[...(state.activity||[]),{id:gid(),ts:Date.now(),who,msg:logMsg}].slice(-200)};
  }
  lsS();render();
  if(DB_URL){try{await fbWrite(state);}catch{fbOnline=false;rdot();}}
}

// Business logic
function calcBal(){
  const b={};state.members.forEach(m=>b[m.id]=0);
  state.expenses.filter(e=>e.paidBy).forEach(({amount,paidBy,paidMembers})=>{
    const sh=amount/N;const paid=new Set(paidMembers||[]);paid.add(paidBy);
    const unpaidCount=state.members.filter(m=>!paid.has(m.id)).length;
    b[paidBy]+=unpaidCount*sh;
  });
  state.qattahs.forEach(q=>{q.shares.forEach(s=>{b[s.memberId]-=s.amount;});});
  state.settlements.forEach(s=>{
    if(s.type==='pool_receive')b[s.memberId]+=+s.amount;
    else if(s.type==='pool_pay')b[s.memberId]-=+s.amount;
    else if(s.type==='member_owes')b[s.memberId]-=+s.amount;
    else if(s.from&&s.to){b[s.from]+=+s.amount;b[s.to]-=+s.amount;}
  });
  const _rp=state.rentPeriods.find(r=>nowM()>=r.startMonth&&nowM()<=addM(r.startMonth,5));
  if(_rp){const _ms=_rp.amount6m/N/6;for(let i=0;i<6;i++){const mk=addM(_rp.startMonth,i);if(mk>nowM())break;const md=state.rentPayments[mk]||{};state.members.forEach(m=>{const e=Array.isArray(md)?null:md[m.id];if(e?.status==='paid'&&!e?.settlementId)return;b[m.id]-=_ms;});}}
  return b;
}
function autoSettleQattah(ns,memberId,reason){
  return{...ns,qattahs:ns.qattahs.map(q=>({...q,shares:q.shares.map(sh=>sh.memberId===memberId&&!sh.settled?{...sh,settled:true,settledBy:reason||'expense'}:sh)}))};
}
function memberBreakdown(mid){
  const lines=[];
  state.expenses.filter(e=>e.paidBy===mid).forEach(e=>{
    const sh=e.amount/N;const paid=new Set(e.paidMembers||[]);paid.add(mid);
    const unpaid=state.members.filter(m=>!paid.has(m.id));
    const direct=state.members.filter(m=>m.id!==mid&&paid.has(m.id));
    if(unpaid.length>0){const lbl=e.name+(e.month?' ('+mLbl(e.month)+')':e.date?' ('+e.date+')':'');lines.push({label:'Fronted: '+lbl+' ('+unpaid.length+' unpaid)',amount:unpaid.length*sh,tag:'fronted'});}
    if(direct.length>0){const lbl=e.name+(e.month?' ('+mLbl(e.month)+')':e.date?' ('+e.date+')':'');lines.push({label:'Fronted: '+lbl+' ('+direct.length+' paid directly)',amount:direct.length*sh,tag:'settled'});}
  });
  state.qattahs.forEach(q=>{const s=q.shares.find(x=>x.memberId===mid);if(s){const lbl=s.settled?(s.settledBy==='cash'?q.name+' ✔ cash paid':q.name+' ✓ settled'):((s.partialPaid||0)>0?q.name+' (partial: '+fmt(s.partialPaid)+' paid)':q.name+' (unsettled)');lines.push({label:lbl,amount:-s.amount,tag:s.settled?'qsettled':'qattah'});}});
  {const _rp=state.rentPeriods.find(r=>nowM()>=r.startMonth&&nowM()<=addM(r.startMonth,5));
  if(_rp){const _ms=_rp.amount6m/N/6;for(let i=0;i<6;i++){const mk=addM(_rp.startMonth,i);if(mk>nowM())break;const md=state.rentPayments[mk]||{};const e=Array.isArray(md)?null:md[mid];let lbl,amt,tag;
    if(!e){lbl='Rent '+mLbl(mk)+' (unpaid)';amt=-_ms;tag='qattah';}
    else if(e.status==='partial'){lbl='Rent '+mLbl(mk)+' (partial: '+fmt(e.paid||0)+' paid)';amt=-_ms;tag='qattah';}
    else if(e.status==='settled'){lbl='Rent '+mLbl(mk)+' ✓ settled';amt=-_ms;tag='qsettled';}
    else if(e.status==='paid'&&!e.settlementId){lbl='Rent '+mLbl(mk)+' ✓ paid';amt=0;tag='qsettled';}
    else{lbl='Rent '+mLbl(mk)+' \uD83D\uDCB0 paid (cash)';amt=-_ms;tag='qsettled';}
    lines.push({label:lbl,amount:amt,tag});}}}
  state.settlements.forEach(s=>{
    if(s.type==='pool_receive'&&s.memberId===mid)lines.push({label:'Paid to Group Account ('+s.date+')',amount:+s.amount,tag:'settlement'});
    if(s.type==='pool_pay'&&s.memberId===mid)lines.push({label:'Received from Group Account ('+s.date+')',amount:-s.amount,tag:'settlement'});
    if(s.type==='member_owes'&&s.memberId===mid){const dd=daysSince(s.date);lines.push({label:'Owes: '+(s.note||'manual debt')+' ('+s.date+(dd>0?' \u00b7 '+dd+'d ago':'')+')',amount:-s.amount,tag:'qattah'});}
    if(!s.type&&s.from===mid){const to=state.members.find(m=>m.id===s.to);lines.push({label:'Paid to '+(to?.name||'?')+' ('+s.date+')',amount:+s.amount,tag:'settlement'});}
    if(!s.type&&s.to===mid){const from=state.members.find(m=>m.id===s.from);lines.push({label:'Received from '+(from?.name||'?')+' ('+s.date+')',amount:-s.amount,tag:'settlement'});}
  });
  return lines;
}
function qPool(){const col=state.qattahs.reduce((s,q)=>s+q.shares.reduce((s2,sh)=>s2+(sh.settledBy==='cash'?sh.amount:(sh.partialPaid||0)),0),0);const spent=state.expenses.reduce((s,e)=>s+e.amount,0);return{col,spent,bal:col-spent};}
function pCnt(e){if(!e.paidBy)return{p:(e.paidMembers||[]).length,t:N};const s=new Set(e.paidMembers||[]);s.add(e.paidBy);return{p:s.size,t:N};}
const daysSince=ds=>{const d=Math.floor((Date.now()-new Date(ds+'T00:00:00'))/86400000);return d>0?d:0;};
const rFor=ym=>state.rentPeriods.find(r=>ym>=r.startMonth&&ym<=addM(r.startMonth,5))||null;
const rCnt=ym=>{const d=state.rentPayments[ym]||{};const p=Array.isArray(d)?d.length:Object.values(d).filter(e=>e&&e.status!=='partial').length;return{p,t:N};};
const qCnt=q=>({p:q.shares.filter(s=>s.settled).length,t:N});
function getNextTue(from){const d=new Date(from);d.setHours(0,0,0,0);const dtt=(2-d.getDay()+7)%7;d.setDate(d.getDate()+dtt);return d;}
function toDS(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function gGroupIdx(ds){const g=state.gathering;if(!g)return 0;if(g.swaps&&g.swaps[ds]!==undefined)return g.swaps[ds];const anc=new Date(g.anchorDate+'T00:00:00');const tgt=new Date(ds+'T00:00:00');const diffD=Math.round((tgt-anc)/86400000);const totalW=Math.round(diffD/7);const skB=(g.skipped||[]).filter(sk=>{const sd=new Date(sk+'T00:00:00');const d=Math.round((sd-anc)/86400000);return d>0&&d<=diffD;}).length;const eff=totalW-skB;const n=g.groups.length;return((g.anchorGroup+eff)%n+n)%n;}
function getGatherings(){const t1=getNextTue(new Date());const t1s=toDS(t1);const t2=new Date(t1);t2.setDate(t1.getDate()+7);const t2s=toDS(t2);const g=state.gathering;return[{date:t1,ds:t1s,group:g?g.groups[gGroupIdx(t1s)]:'?',skipped:(g&&g.skipped||[]).includes(t1s)},{date:t2,ds:t2s,group:g?g.groups[gGroupIdx(t2s)]:'?',skipped:(g&&g.skipped||[]).includes(t2s)}];}
function getPoolAlert(){const pool=qPool();if(pool.bal>=0)return null;const short=-pool.bal;const perP=Math.ceil(short/N/50)*50;return{short,perP};}
function getRentAlert(){const ym=nowM(),rp=rFor(ym);if(!rp)return null;const lastM=addM(rp.startMonth,5);const twoOut=addM(ym,2);if(lastM>twoOut)return null;const months=[];for(let i=0;i<6;i++){const mk=addM(rp.startMonth,i);if(mk>=ym)months.push(mk);}return{lastM,months};}

// DOM helpers
function el(tag,a,c){if(Array.isArray(a)){c=a;a={};}const e=document.createElement(tag);Object.entries(a||{}).forEach(([k,v])=>{if(k==='style'&&typeof v==='object')Object.assign(e.style,v);else if(k.startsWith('on')&&typeof v==='function')e.addEventListener(k.slice(2).toLowerCase(),v);else if(k==='class')e.className=v;else e.setAttribute(k,v);});(c||[]).forEach(x=>{if(x!=null)e.append(typeof x==='string'?document.createTextNode(x):x);});return e;}
function ib(cb,svg,title=''){const b=document.createElement('button');b.style.cssText='background:none;border:none;cursor:pointer;color:var(--muted);padding:4px;display:inline-flex;align-items:center';b.innerHTML=svg;b.title=title;b.addEventListener('click',cb);return b;}
function fw(lbl,child){return el('div',{style:{marginBottom:'14px'}},[el('div',{style:{fontSize:'12px',fontWeight:'500',color:'var(--muted)',marginBottom:'5px',textTransform:'uppercase',letterSpacing:'.4px'}},[lbl]),child]);}
function mki(type,ph,val,cb){const i=document.createElement('input');i.type=type;i.placeholder=ph;if(val)i.value=val;i.addEventListener('input',e=>cb(e.target.value));return i;}
function mks(opts,cb){const s=document.createElement('select');opts.forEach(([v,l])=>s.appendChild(el('option',{value:v},[l])));s.addEventListener('change',e=>cb(e.target.value));return s;}
function showModal(title,content){

// Payment modal
function openPayModal(type,id){

  // ── Rent modal: per-member Settled / Cash paid (mirrors Qattah) ───────────

        }else if(isSettled){
          upd(p=>({...p,rentPayments:{...p.rentPayments,[ym]:Object.fromEntries(Object.entries(p.rentPayments[ym]||{}).filter(([k])=>k!==m.id))}}));
        }else{

      const poolBtn=el('button',{class:'btn btn-g',style:{width:'100%',marginBottom:'8px'}},['Pool settles remaining (mark as closed)']);
      poolBtn.addEventListener('click',()=>{upd(p=>({...p,expenses:p.expenses.map(e=>e.id===id?{...e,poolSettled:true}:e)}),'pool settled remaining for: '+exp.name);modalEl&&(modalEl.remove(),modalEl=null);});

  // ── Qattah modal: unified Settled / Cash paid table ───────────────────────
  const q=state.qattahs.find(x=>x.id===id);if(!q)return;

  function buildTable(){

        }else{
          upd(p=>({...p,qattahs:p.qattahs.map(x=>x.id===id?{...x,shares:x.shares.map(s=>s.memberId===m.id?{...s,settled:!isSettled,settledBy:!isSettled?'expense':null}:s)}:x)}),(!isSettled?'marked ':'unmarked ')+m.name+' as settled in '+q.name);
        }
        modalEl&&(modalEl.remove(),modalEl=null);openPayModal('qattah',id);
      });
      row.appendChild(sBtn);
      const hasPartial=(share.partialPaid||0)>0&&!isCashPaid&&!isSettled;
      const cLbl=isCashPaid?'\u2714 Paid':hasPartial?fmt(share.partialPaid).replace('SAR ','')+'/'+fmt(share.amount).replace('SAR ',''):'Cash';
      const cBtn=el('button',{style:{width:'72px',padding:'5px 4px',borderRadius:'var(--rsm)',border:'1px solid var(--border)',cursor:'pointer',fontSize:'11px',fontWeight:'500',fontFamily:'inherit',background:isCashPaid?'#fef3c7':hasPartial?'var(--s-warn)':'var(--card)',color:isCashPaid?'#92400e':hasPartial?'var(--c-warn)':'var(--muted)'}},[cLbl]);
      cBtn.addEventListener('click',()=>{
        if(isCashPaid){
          upd(p=>({...p,qattahs:p.qattahs.map(x=>x.id===id?{...x,shares:x.shares.map(s=>s.memberId===m.id?{...s,settled:false,settledBy:null,cashSettlementId:null}:s)}:x),settlements:p.settlements.filter(s=>s.id!==share.cashSettlementId)}),'undid '+m.name+' cash payment for '+q.name);

        if(inp===null)return;
        const amt=+inp;
        if(!amt||amt<=0)return;
        const sid=gid();
        if(amt>=remaining){
          // full: settle as cash
          upd(p=>({...p,qattahs:p.qattahs.map(x=>x.id===id?{...x,shares:x.shares.map(s=>s.memberId===m.id?{...s,settled:true,settledBy:'cash',cashSettlementId:sid}:s)}:x),settlements:[...p.settlements,{id:sid,type:'pool_receive',memberId:m.id,amount:remaining,date:nowD(),note:q.name+' \u2014 Qattah cash payment'}]}),'recorded '+m.name+' cash payment for '+q.name+' ('+fmt(remaining)+')');
        }else{
          // partial
          upd(p=>({...p,qattahs:p.qattahs.map(x=>x.id===id?{...x,shares:x.shares.map(s=>s.memberId===m.id?{...s,partialPaid:(s.partialPaid||0)+amt,partialIds:[...(s.partialIds||[]),sid]}:s)}:x),settlements:[...p.settlements,{id:sid,type:'pool_receive',memberId:m.id,amount:amt,date:nowD(),note:q.name+' \u2014 partial payment'}]}),'recorded '+m.name+' PARTIAL payment for '+q.name+' ('+fmt(amt)+' of '+fmt(share.amount)+')');
        }
        modalEl&&(modalEl.remove(),modalEl=null);openPayModal('qattah',id);
      });
      row.appendChild(cBtn);tbl.appendChild(row);
    });
    return tbl;
  }
  content.appendChild(buildTable());
  content.appendChild(el('button',{class:'btn btn-p',style:{width:'100%',marginTop:'14px'},onclick:()=>{modalEl&&(modalEl.remove(),modalEl=null);}},['Done']));
  showModal('Qattah: '+q.name,content);
}

// Monthly statement
function openStatement(){
  const ym=nowM();const rp=rFor(ym);const ms=rp?rp.amount6m/N/6:0;
  const rc=rCnt(ym);
  const monthExp=state.expenses.filter(e=>(e.month||(e.date||'').slice(0,7))===ym);
  const expTotal=monthExp.reduce((s,e)=>s+e.amount,0);
  const pool=qPool();const bal=calcBal();
  const debtors=state.members.filter(m=>bal[m.id]<-0.5).sort((a,b)=>bal[a.id]-bal[b.id]);
  const lines=[];
  lines.push('\uD83D\uDCCB Alshather \u2014 '+mLbl(ym)+' Statement');
  lines.push('');
  if(rp){lines.push('\uD83C\uDFE0 Rent: '+rc.p+'/'+N+' paid ('+fmt(rc.p*ms)+' of '+fmt(N*ms)+')');}
  lines.push('\uD83D\uDED2 Expenses this month: '+fmt(expTotal)+' ('+monthExp.length+' items)');
  lines.push('\uD83D\uDCB0 Qattah pool balance: '+fmt(pool.bal));
  if(debtors.length){lines.push('');lines.push('\u26A0 Outstanding:');debtors.forEach(m=>lines.push('  \u2022 '+m.name+': '+fmt(-bal[m.id])));}
  else{lines.push('');lines.push('\u2713 Everyone is settled!');}
  const txt=lines.join('\n');
  const content=el('div');
  const pre=el('div',{style:{background:'var(--sec)',borderRadius:'var(--rsm)',padding:'14px',fontSize:'13px',whiteSpace:'pre-wrap',fontFamily:'inherit',lineHeight:'1.8',marginBottom:'12px'}},[txt]);
  content.appendChild(pre);
  const cb=el('button',{class:'btn btn-p',style:{width:'100%'}},['\uD83D\uDCCB Copy for WhatsApp']);
  cb.addEventListener('click',()=>{navigator.clipboard.writeText(txt).then(()=>{cb.textContent='\u2713 Copied!';setTimeout(()=>cb.textContent='\uD83D\uDCCB Copy for WhatsApp',2000);});});
  content.appendChild(cb);
  showModal('Monthly statement',content);
}

  const ki=mki('text','AIza... (Web API Key, optional but recommended)',apiKey,v=>apiKey=v.trim());ki.value=apiKey;

      const r=await fetch(testUrl,{signal:AbortSignal.timeout(8000)});
      if(r.status===401||r.status===403)throw new Error('auth');if(!r.ok)throw new Error();
      DB_URL=clean;localStorage.setItem(LS_FB,clean);
      history.replaceState(null,'',location.pathname+'#'+btoa(FB_KEY?JSON.stringify({u:clean,k:FB_KEY}):clean));
      // SAFE CONNECT: if the database already has data, adopt it - never overwrite
      let remote=null;try{remote=await fbRead();}catch{}
      const remoteHasData=remote&&((remote.expenses||[]).length||(remote.qattahs||[]).length||(remote.settlements||[]).length||(remote.rentPeriods||[]).length||(remote.members||[]).some(m=>m&&m.name&&!/^Person \d+$/.test(m.name)));
      if(remoteHasData){state=migrate(remote);lsS();}
      else{await fbWrite(state);}
      fbSub();modalEl&&(modalEl.remove(),modalEl=null);render();
    }catch(e){errEl.innerHTML=e.message==='auth'
      ?'Permission denied. Either: (1) your rules require auth \u2014 paste your Web API Key above and make sure Anonymous sign-in is enabled in Firebase Authentication, or (2) set the rules to allow authenticated access.'
      :'Could not connect. Check the Database URL (Firebase Console > Realtime Database > Data tab) and the API key (Project settings > General > Web API Key).';
      errEl.style.display='block';cBtn.textContent='Connect and enable live sync';cBtn.disabled=false;}
  });

// Activity log
function renderActivity(){
  const w=el('div',{style:{padding:'20px',maxWidth:'860px',margin:'0 auto'}});
  // Device name selector (who am I on this device)
  const nameCard=el('div',{class:'card',style:{marginBottom:'16px',display:'flex',justifyContent:'space-between',alignItems:'center',gap:'12px',flexWrap:'wrap'}});
  nameCard.appendChild(el('div',[el('div',{style:{fontWeight:'500',fontSize:'14px'}},['Your name on this device']),el('div',{style:{fontSize:'12px',color:'var(--muted)',marginTop:'2px'}},['Actions you take are recorded under this name'])]));
  const sel=mks([['','-- Not set --'],...state.members.map(m=>[m.id,m.name])],v=>{const m=state.members.find(x=>x.id===v);localStorage.setItem('aca-devname',m?m.name:'');});
  const cur=devName();const curM=state.members.find(m=>m.name===cur);if(curM)sel.value=curM.id;
  sel.style.maxWidth='200px';
  nameCard.appendChild(sel);w.appendChild(nameCard);
  // Log entries
  w.appendChild(el('div',{style:{fontWeight:'500',fontSize:'16px',marginBottom:'12px'}},['Activity log']));
  const acts=[...(state.activity||[])].reverse();
  if(!acts.length){w.appendChild(el('div',{class:'card',style:{color:'var(--muted)',fontSize:'13px'}},['No activity recorded yet. Actions like payments, new expenses, and edits will appear here.']));return w;}
  const list=el('div',{style:{background:'var(--card)',borderRadius:'var(--radius)',border:'1px solid var(--border)',overflow:'hidden'}});
  acts.forEach((a,i)=>{
    const d=new Date(a.ts);
    const when=d.toLocaleDateString('en',{month:'short',day:'numeric'})+' '+d.toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit'});
    const row=el('div',{style:{padding:'10px 16px',borderBottom:i<acts.length-1?'1px solid var(--border)':'none',display:'flex',justifyContent:'space-between',gap:'12px',alignItems:'baseline'}});
    row.appendChild(el('div',{style:{fontSize:'13px',flex:'1'}},[a.who?el('strong',{},[a.who+' ']):'',a.msg]));
    row.appendChild(el('div',{style:{fontSize:'11px',color:'var(--muted)',flexShrink:'0'}},[when]));
    list.appendChild(row);
  });
  w.appendChild(list);
  // Backups card (admin only)
  if(isAdmin&&DB_URL){
    const bc=el('div',{class:'card',style:{marginTop:'16px'}});
    bc.appendChild(el('div',{style:{fontWeight:'500',fontSize:'14px',marginBottom:'4px'}},['Daily backups']));
    bc.appendChild(el('div',{style:{fontSize:'12px',color:'var(--muted)',marginBottom:'10px'}},['A snapshot is saved automatically once per day (last 7 kept). Restore replaces ALL current data.']));
    const holder=el('div',{style:{fontSize:'13px',color:'var(--muted)'}},['Loading backups...']);
    bc.appendChild(holder);
    listBackups().then(keys=>{
      holder.innerHTML='';
      if(!keys.length){holder.textContent='No backups yet \u2014 the first one is created on next app load.';return;}
      keys.forEach(k=>{
        const row=el('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'7px 0',borderBottom:'1px solid var(--border)'}});
        row.appendChild(el('div',{style:{fontSize:'13px',fontWeight:'500'}},[k]));
        const rb=el('button',{class:'btn btn-g btn-sm'},['Restore']);
        rb.addEventListener('click',async()=>{
          if(!confirm('Replace ALL current data with the backup from '+k+'? This cannot be undone (though today\u2019s snapshot still exists).'))return;
          rb.textContent='Restoring...';rb.disabled=true;
          try{await restoreBackup(k);}catch{rb.textContent='Failed';setTimeout(()=>{rb.textContent='Restore';rb.disabled=false;},2000);}
        });
        row.appendChild(rb);holder.appendChild(row);
      });
    });
    w.appendChild(bc);
  }
  return w;
}
function render(){const root=document.getElementById('root');root.innerHTML='';if(!state){root.innerHTML='<div style="padding:40px;text-align:center;color:var(--muted)">Loading...</div>';return;}root.appendChild(renderHeader());const pages={dashboard:renderDashboard,members:renderMembers,rent:renderRent,expenses:renderExpenses,qattah:renderQattah,balances:renderBalances,activity:renderActivity};const page=pages[tab]?.();if(page)root.appendChild(page);}

async function init(){
  const hash=location.hash.slice(1);
  if(hash){try{
    const raw=atob(hash);
    let url=null,key=null;
    if(raw.startsWith('{')){const p=JSON.parse(raw);url=p.u;key=p.k||null;}
    else url=raw; // legacy link format (URL only)
    if(isValidFb(url)){DB_URL=url;localStorage.setItem(LS_FB,url);if(key){FB_KEY=key;localStorage.setItem('aca-fbkey',key);}}
  }catch{}}
  if(!DB_URL)DB_URL=localStorage.getItem(LS_FB)||null;
  if(!FB_KEY)FB_KEY=localStorage.getItem('aca-fbkey')||null;
  const local=lsL();
  function bestMembers(a,b){const real=arr=>(arr||[]).filter(m=>m&&m.name&&!m.name.match(/^Person \d+$/)).length;if(real(a)>=real(b))return a;return b;}
  if(DB_URL){
    try{const data=await fbRead();
      if(data){const fbM=data.members||[];const lsM=(local&&local.members)||[];
        const best=bestMembers(fbM,lsM);const realCount=best.filter(m=>m&&m.name&&!m.name.match(/^Person \d+$/)).length;
        data.members=realCount>1?best:INIT.members;}
      state=migrate(data||{});lsS();await fbWrite(state);
    }catch{state=migrate(local);}
    fbSub();
  }else{
    state=migrate(local);
    const defaultCount=state.members.filter(m=>m.name.match(/^Person \d+$/)).length;
    if(defaultCount>1){state.members=INIT.members.map((m,i)=>({...m,...(state.members[i]||{}),name:m.name}));lsS();}
  }
  if(!state.adminHash)isAdmin=true;
  rollRecurring();
  render();
  fbSnapshot();
}
// Auto-create this month's copy of recurring monthly expenses
function rollRecurring(){
  const ym=nowM();
  const toAdd=[];
  const recIds=new Set();
  state.expenses.forEach(e=>{
    if(e.type==='monthly'&&e.recurring&&e.recurringId&&e.month===ym)recIds.add(e.recurringId);
  });
  // group recurring series by recurringId, take the latest instance
  const series={};
  state.expenses.forEach(e=>{
    if(e.type==='monthly'&&e.recurring&&e.recurringId&&!recIds.has(e.recurringId)){
      if(!series[e.recurringId]||e.month>series[e.recurringId].month)series[e.recurringId]=e;
    }
  });
  Object.values(series).forEach(src=>{
    if(src.month<ym)toAdd.push({id:gid(),type:'monthly',name:src.name,amount:src.amount,paidBy:src.paidBy||null,paidMembers:src.paidBy?[src.paidBy]:[],note:src.note||'',month:ym,recurring:true,recurringId:src.recurringId,poolSettled:false});
  });
  if(toAdd.length){
    upd(p=>({...p,expenses:[...p.expenses,...toAdd]}),'auto-created '+toAdd.length+' recurring expense'+(toAdd.length>1?'s':'')+' for '+mLbl(ym));
  }
}
